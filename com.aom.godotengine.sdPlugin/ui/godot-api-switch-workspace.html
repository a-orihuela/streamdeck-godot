<!DOCTYPE html>
<html>

<head lang="en">
    <title>API Switch Workspace Settings</title>
    <meta charset="utf-8" />
    <script src="https://sdpi-components.dev/releases/v4/sdpi-components.js"></script>
</head>

<body>
    <sdpi-item label="Workspace">
        <sdpi-select setting="workspace" default="2D">
            <option value="2D">2D Editor</option>
            <option value="3D">3D Editor</option>
            <option value="Script">Script Editor</option>
            <option value="AssetLib">Asset Library</option>
        </sdpi-select>
    </sdpi-item>
    <sdpi-item label="Host (default: 127.0.0.1)">
        <sdpi-textfield setting="host" placeholder="127.0.0.1"></sdpi-textfield>
    </sdpi-item>
    <sdpi-item label="Port (default: 9876)">
        <sdpi-textfield setting="port" placeholder="9876"></sdpi-textfield>
    </sdpi-item>
</body>

</html>
